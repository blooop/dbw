# FZF (Fuzzy Finder) extension for dbw
# Adds the popular command-line fuzzy finder tool

version: '3.8'

services:
  dev:
    environment:
      # FZF configuration
      FZF_DEFAULT_OPTS: >-
        --height=40% 
        --layout=reverse 
        --border 
        --inline-info
        --preview='[[ $(file --mime {}) =~ binary ]] && echo {} is a binary file || (cat {} || tree -C {}) 2> /dev/null | head -300'
        --preview-window='right:50%:wrap'
        --bind='ctrl-u:page-up,ctrl-d:page-down,ctrl-a:select-all,ctrl-t:toggle-all'
      
      # Better default command (respects .gitignore)
      FZF_DEFAULT_COMMAND: 'fd --type f --hidden --follow --exclude .git'
      
      # Ctrl+T command
      FZF_CTRL_T_COMMAND: '$FZF_DEFAULT_COMMAND'
      
      # Alt+C command  
      FZF_ALT_C_COMMAND: 'fd --type d --hidden --follow --exclude .git'
    
    # Additional volumes for shell integration
    volumes:
      # Mount fzf shell integration scripts
      - fzf_shell_integration:/usr/share/fzf:ro

volumes:
  fzf_shell_integration:
    external: false